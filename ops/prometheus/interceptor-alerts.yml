groups:
  - name: interceptor-alerts
    rules:
      - alert: InterceptorTransportErrorRateHigh
        expr: |
          sum(rate(interceptor_transport_send_total{outcome="transport_error"}[5m]))
            /
          clamp_min(sum(rate(interceptor_transport_send_total[5m])), 1)
            > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Transport error rate above 10%"
          description: "Serial transport errors are consistently above expected threshold for 10 minutes."

      - alert: InterceptorReadbackFailureRateHigh
        expr: |
          sum(rate(interceptor_readback_total{outcome=~"io_error|invalid_frame"}[5m]))
            /
          clamp_min(sum(rate(interceptor_readback_total[5m])), 1)
            > 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Readback failure rate above 15%"
          description: "Readback is returning IO errors or invalid frames at elevated levels."

      - alert: InterceptorVerificationRetriesSpike
        expr: |
          sum(rate(interceptor_verification_total{outcome="retry_scheduled"}[5m])) > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High verification retry volume"
          description: "Commands are frequently entering RETRY_SCHEDULED, indicating actuation or sensing drift."

      - alert: InterceptorLifecycleLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(interceptor_command_lifecycle_duration_seconds_bucket[10m])) by (le)
          ) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "P95 lifecycle latency above 5s"
          description: "Command end-to-end lifecycle latency is above target."
