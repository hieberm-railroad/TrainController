name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        working-directory: interceptor-java
        run: mvn -q test

  platformio-tests:
    name: PlatformIO Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run PlatformIO tests
        working-directory: firmware-arduino
        run: pio test -e native -v
